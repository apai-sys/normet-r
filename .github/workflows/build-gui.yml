name: Build GUI installers

on:
  push:
    branches: [main]
    paths:
      - "gui/**"
      - ".github/workflows/build-gui.yml"
  workflow_dispatch:   # trigger a build manually from the Actions tab

defaults:
  run:
    working-directory: gui

jobs:
  smoke-test:
    name: GUI import smoke test (Linux, offscreen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system Qt libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0
      - name: Install GUI package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import the GUI package offscreen
        # No R install here — this only checks the Qt/Python side imports and
        # constructs, the same coverage as the frozen app's startup path
        # before it shells out to Rscript.
        run: |
          QT_QPA_PLATFORM=offscreen python -c "
          from PySide6.QtWidgets import QApplication
          app = QApplication([])
          from normet_r_gui.main_window import MainWindow
          w = MainWindow()
          print('MainWindow constructed OK')
          "

  build:
    name: Build (${{ matrix.os }})
    needs: smoke-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GUI package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller

      # ---------------- macOS: .app bundle + .dmg ----------------
      - name: Build macOS app + dmg
        if: runner.os == 'macOS'
        run: packaging/macos/build_dmg.sh "$(python -c 'import sys; print(sys.executable)')"

      # ---------------- Windows / Linux: PyInstaller onedir ----------------
      - name: Build executable (Windows/Linux)
        if: runner.os != 'macOS'
        run: pyinstaller --noconfirm packaging/normet_r_gui.spec

      # ---------------- Windows: Inno Setup installer ----------------
      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path pyproject.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=$ver" packaging\windows\installer.iss

      # ---------------- Linux: AppImage ----------------
      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: bash packaging/linux/build_appimage.sh

      # ---------------- Upload artifacts ----------------
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: normet-gui-${{ runner.os }}
          path: |
            gui/dist/macos/*.dmg
            gui/dist/*.exe
            gui/dist/*.AppImage
          if-no-files-found: warn
